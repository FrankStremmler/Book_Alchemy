<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Add Author</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  </head>
  <body>
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      <div class="flash-messages">
        {% for category, message in messages %}
          <div class="alert alert-{{ category }}">
            {{ message }}
          </div>
        {% endfor %}
      </div>
    {% endif %}
  {% endwith %}
  <form action="/add_author" method="POST">
      <label for="name">Author Name:</label> 
      <input type="text" id="name" name="name" required><br><br>
      
      <label for="birthdate">Birthdate:</label> 
      <input type="date" id="birthdate" name="birthdate" required><br><br> 
      <label for="date_of_death">Date of Death:</label> 
      <input type="date" id="date_of_death" name="date_of_death"><br><br>
      <button type="submit"class="btn">Autor anlegen</button>
      <button type="reset" class="btn">Abbrechen</button>
      <a href="{{ url_for('home') }}" class="btn">Startseite</a>
    </form>

  </body>
</html>
