<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Add Book</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta http-equiv="X-UA-Compatible" content="ie=edge">
        <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    </head>
    <body>
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="flash-{{ category }}">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form action="/add_book" method="POST">
            <label for="title">Title:</label> 
            <input type="text" id="name" name="title" required><br><br>
            
            <label for="isbn">ISBN:</label> 
            <input type="text" id="birthdate" name="isbn" required><br><br> 
            <label for="year_select">Jahr wählen:</label>
            <select name="publication_year" id="year_select">
                {% for y in range(2025, 1899, -1) %}
                    <option value="{{ y }}">{{ y }}</option>
                {% endfor %}
            </select><br><br>
            <label>Autor wählen:</label>
            <select name="author_id" required>
                <option value="" disabled selected>-- Bitte wählen --</option>
                {% for author in authors %}
                    <option value="{{ author.id }}">{{ author.name }}</option>
                {% endfor %}
            </select>
            <br>
            <br>
            <button type="submit"class="btn">Buch anlegen</button>
            <button type="reset" class="btn">Abbrechen</button>
            <a href="{{ url_for('home') }}" class="btn">Startseite</a>
        </form>
    </body>
</html>
